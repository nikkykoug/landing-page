<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="4;url=https://script.google.com/macros/s/AKfycbyMe6ktUuF-rJB4d_TzJuE-dB2KaQfu3snXAnqaki0KdIjfeSvHSRDESUeRxMZvdaD3/exec">
<title>NIKKYKOUG</title>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800,900&f[]=satoshi@400,500&display=swap" rel="stylesheet">
<style>
:root{
  --font-display:'Cabinet Grotesk','Arial Black',sans-serif;
  --font-body:'Satoshi','Inter',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-hero:clamp(3.2rem,1.5rem + 8vw,9rem);
  --space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --radius-full:9999px;--transition:200ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --bg:#0a0a0f;--surface:#111118;--surface-2:#16161f;
  --border:oklch(1 0 0 / 0.07);--text:#e8e8f0;--text-muted:#8888aa;--text-faint:#44445a;
  --accent:#7c6fff;--accent-2:#ff6fb0;
  --accent-glow:oklch(0.65 0.2 280 / 0.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{min-height:100dvh;font-family:var(--font-body);background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}

/* BG */
.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 14s ease-in-out infinite alternate;}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,oklch(0.55 0.22 280 / 0.18),transparent 70%);top:-15%;left:-10%;animation-duration:14s;}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,oklch(0.65 0.22 340 / 0.14),transparent 70%);bottom:-10%;right:-5%;animation-duration:18s;animation-delay:-4s;}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,oklch(0.55 0.18 220 / 0.12),transparent 70%);top:40%;left:55%;animation-duration:22s;animation-delay:-8s;}
@keyframes drift{0%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,-30px) scale(1.08);}100%{transform:translate(-20px,25px) scale(0.95);}}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(oklch(1 0 0 / 0.025) 1px,transparent 1px),linear-gradient(90deg,oklch(1 0 0 / 0.025) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);}

/* Stage */
.stage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:var(--space-8) var(--space-6);animation:enterStage 1.2s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes enterStage{from{opacity:0;transform:translateY(32px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}

/* Logo */
.logo-wrap{position:relative;margin-bottom:var(--space-8);width:100px;height:100px;}
.logo-ring{position:absolute;inset:0;border-radius:28px;border:1.5px solid var(--border);background:linear-gradient(135deg,var(--surface-2),var(--surface));box-shadow:0 0 0 1px oklch(1 0 0 / 0.04),0 8px 32px oklch(0 0 0 / 0.4),inset 0 1px 0 oklch(1 0 0 / 0.08);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.logo-ring::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,oklch(0.65 0.2 280 / 0.2),transparent 60%);}
.logo-pulse,.logo-pulse-2{position:absolute;border:1px solid oklch(0.65 0.2 280 / 0.2);animation:pulse-ring 3s ease-out infinite;}
.logo-pulse{inset:-12px;border-radius:36px;}
.logo-pulse-2{inset:-24px;border-radius:44px;border-color:oklch(0.65 0.2 280 / 0.1);animation-delay:1s;}
@keyframes pulse-ring{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1.15);}}

/* Brand — one line */
.brand{
  font-family:var(--font-display);
  font-size:var(--text-hero);
  font-weight:900;
  line-height:0.95;
  letter-spacing:-0.03em;
  margin-bottom:0.6rem;
  white-space:nowrap;
  background:linear-gradient(135deg,#ffffff 0%,oklch(0.82 0.14 280) 45%,var(--accent-2) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 32px oklch(0.65 0.22 280 / 0.45));
}

/* Energy loader bar */
.energy-wrap{
  width:min(340px,85vw);
  margin-bottom:var(--space-10);
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:6px;
}
.energy-label{
  display:flex;
  justify-content:space-between;
  width:100%;
  font-size:var(--text-xs);
  color:var(--text-muted);
  letter-spacing:0.08em;
  font-weight:500;
}
.energy-label span:last-child{
  color:var(--accent);
  font-variant-numeric:tabular-nums;
}
.energy-track{
  width:100%;
  height:10px;
  background:oklch(1 0 0 / 0.05);
  border-radius:var(--radius-full);
  border:1px solid oklch(1 0 0 / 0.06);
  overflow:hidden;
  position:relative;
}
.energy-track::before{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent calc(10% - 1px),oklch(0 0 0 / 0.25) calc(10% - 1px),oklch(0 0 0 / 0.25) 10%);
  z-index:2;
  pointer-events:none;
}
.energy-fill{
  height:100%;
  width:0%;
  border-radius:var(--radius-full);
  background:linear-gradient(90deg,var(--accent),oklch(0.72 0.2 300),var(--accent-2));
  background-size:200% 100%;
  animation:energy-progress 3.6s cubic-bezier(0.4,0,0.2,1) forwards, energy-shimmer 1.5s linear infinite;
  box-shadow:0 0 12px var(--accent-glow),0 0 4px oklch(0.65 0.22 280 / 0.6);
  position:relative;
}
.energy-fill::after{
  content:'';
  position:absolute;
  right:0;top:0;bottom:0;
  width:20px;
  background:linear-gradient(90deg,transparent,oklch(1 0 0 / 0.45));
  border-radius:var(--radius-full);
  animation:pulse-tip 0.6s ease-in-out infinite alternate;
}
@keyframes pulse-tip{from{opacity:0.6;}to{opacity:1;}}
@keyframes energy-progress{0%{width:0%;}100%{width:100%;}}
@keyframes energy-shimmer{0%{background-position:100% 0;}100%{background-position:-100% 0;}}

/* Tagline */
.tagline{font-size:var(--text-sm);font-weight:500;color:var(--text-muted);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:var(--space-10);}

/* Character */
.char-wrap{margin-bottom:var(--space-10);}
.char-svg{width:120px;height:120px;filter:drop-shadow(0 0 20px oklch(0.65 0.22 280 / 0.4));animation:float-char 4s ease-in-out infinite;}
@keyframes float-char{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-12px) rotate(2deg);}}

/* Pills */
.pills{display:flex;flex-wrap:wrap;gap:var(--space-2);justify-content:center;margin-bottom:var(--space-10);}
.pill{padding:6px 16px;border-radius:var(--radius-full);border:1px solid var(--border);background:oklch(1 0 0 / 0.04);font-size:var(--text-xs);font-weight:500;color:var(--text-muted);letter-spacing:0.04em;backdrop-filter:blur(8px);transition:all var(--transition);}
.pill:hover{background:oklch(1 0 0 / 0.08);color:var(--text);}

/* Fallback */
.fallback{position:fixed;bottom:var(--space-6);left:50%;transform:translateX(-50%);font-size:var(--text-xs);color:var(--text-faint);white-space:nowrap;}
.fallback a{color:oklch(0.65 0.2 280 / 0.7);text-decoration:none;}
.fallback a:hover{color:var(--accent);}

/* Particles */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;}
.p{position:absolute;border-radius:50%;animation:float-p var(--d,8s) ease-in-out infinite;animation-delay:var(--dl,0s);opacity:0;}
@keyframes float-p{0%{opacity:0;transform:translateY(0) scale(0.5);}20%{opacity:0.6;}80%{opacity:0.3;}100%{opacity:0;transform:translateY(-80px) scale(1.2);}}

@media(max-width:480px){.logo-wrap{width:80px;height:80px;}.char-svg{width:90px;height:90px;}.brand{letter-spacing:-0.04em;}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div class="particles" id="particles"></div>

<div class="stage">
  <div class="logo-wrap">
    <div class="logo-pulse-2"></div><div class="logo-pulse"></div>
    <div class="logo-ring">
      <svg width="64" height="60" viewBox="0 0 64 60" fill="none" aria-label="NK logo" style="position:relative;z-index:1">
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="64" y2="60" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#7c6fff"/>
            <stop offset="100%" stop-color="#ff6fb0"/>
          </linearGradient>
        </defs>
        <path d="M6 46V14l18 28V14" stroke="url(#lg1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M34 14v32" stroke="url(#lg1)" stroke-width="4" stroke-linecap="round"/>
        <path d="M34 30l16-16" stroke="url(#lg1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M34 30l16 16" stroke="url(#lg1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="56" cy="46" r="3.5" fill="url(#lg1)"/>
      </svg>
    </div>
  </div>

  <div class="brand">NIKKYKOUG</div>

  <div class="tagline">Digital Universe &middot; เข้าสู่ระบบ</div>

  <div class="energy-wrap">
    <div class="energy-label">
      <span>&#x26A1; ENERGY CORE</span>
      <span id="pct">0%</span>
    </div>
    <div class="energy-track">
      <div class="energy-fill"></div>
    </div>
  </div>

  <div class="char-wrap">
    <svg class="char-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Nikkykoug robot mascot">
      <defs>
        <linearGradient id="bodyGrad" x1="20" y1="30" x2="100" y2="110" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#7c6fff" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#ff6fb0" stop-opacity="0.8"/>
        </linearGradient>
        <linearGradient id="screenGrad" x1="35" y1="40" x2="85" y2="80" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#0a0a1f"/><stop offset="100%" stop-color="#12122a"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <line x1="60" y1="14" x2="60" y2="28" stroke="#7c6fff" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="60" cy="11" r="4" fill="#7c6fff" filter="url(#glow)"/>
      <rect x="28" y="28" width="64" height="50" rx="14" fill="url(#bodyGrad)"/>
      <rect x="35" y="36" width="50" height="34" rx="8" fill="url(#screenGrad)"/>
      <rect x="43" y="44" width="12" height="8" rx="3" fill="#7c6fff" filter="url(#glow)"/>
      <rect x="65" y="44" width="12" height="8" rx="3" fill="#ff6fb0" filter="url(#glow)"/>
      <rect x="44" y="45" width="4" height="2" rx="1" fill="white" opacity="0.5"/>
      <rect x="66" y="45" width="4" height="2" rx="1" fill="white" opacity="0.5"/>
      <path d="M49 58 Q60 66 71 58" stroke="#7c6fff" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)"/>
      <rect x="54" y="78" width="12" height="8" rx="4" fill="url(#bodyGrad)"/>
      <rect x="30" y="86" width="60" height="26" rx="12" fill="url(#bodyGrad)"/>
      <rect x="40" y="92" width="40" height="14" rx="6" fill="rgba(0,0,0,0.2)"/>
      <circle cx="48" cy="99" r="3" fill="#7c6fff" filter="url(#glow)"/>
      <circle cx="60" cy="99" r="3" fill="#ff6fb0" filter="url(#glow)"/>
      <circle cx="72" cy="99" r="3" fill="#7c6fff" filter="url(#glow)"/>
      <rect x="14" y="88" width="14" height="20" rx="7" fill="url(#bodyGrad)"/>
      <rect x="92" y="88" width="14" height="20" rx="7" fill="url(#bodyGrad)"/>
      <circle cx="21" cy="112" r="5" fill="url(#bodyGrad)"/>
      <circle cx="99" cy="112" r="5" fill="url(#bodyGrad)"/>
      <rect x="40" y="112" width="14" height="8" rx="4" fill="url(#bodyGrad)"/>
      <rect x="66" y="112" width="14" height="8" rx="4" fill="url(#bodyGrad)"/>
    </svg>
  </div>

  <div class="pills">
    <span class="pill">&#x2726; ระบบ</span>
    <span class="pill">&#x2726; แดชบอร์ด</span>
    <span class="pill">&#x2726; เครื่องมือ</span>
    <span class="pill">&#x2726; Analytics</span>
  </div>
</div>

<div class="fallback">หากไม่ redirect อัตโนมัติ &rarr; <a href="https://script.google.com/macros/s/AKfycbyMe6ktUuF-rJB4d_TzJuE-dB2KaQfu3snXAnqaki0KdIjfeSvHSRDESUeRxMZvdaD3/exec" target="_blank" rel="noopener">คลิกที่นี่</a></div>

<script>
(function(){
  var c=document.getElementById('particles'),colors=['#7c6fff','#ff6fb0','#6fb0ff'];
  for(var i=0;i<18;i++){
    var p=document.createElement('div');p.className='p';
    var s=Math.random()*3+1.5;
    p.style.cssText='width:'+s+'px;height:'+s+'px;left:'+Math.random()*100+'%;top:'+(20+Math.random()*70)+'%;background:'+colors[i%3]+';--d:'+(6+Math.random()*10)+'s;--dl:'+(-Math.random()*10)+'s;';
    c.appendChild(p);
  }
})();

(function(){
  var el=document.getElementById('pct');
  var start=Date.now(), dur=3600;
  function tick(){
    var t=Math.min((Date.now()-start)/dur,1);
    var eased=t<1?1-Math.pow(1-t,3):1;
    el.textContent=Math.round(eased*100)+'%';
    if(t<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
